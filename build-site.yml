name: Generate Portfolio Site
on:
  push:
    branches: [ main ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Process Projects and Generate HTML
        shell: python
        run: |
          import os
          import json

          ASSETS_DIR = './static-assets'
          TEMPLATE_PATH = './project-template.html'
          OUTPUT_PATH = './index.html'

          html_sections = []
          project_folders = sorted([f for f in os.listdir(ASSETS_DIR) if os.path.isdir(os.path.join(ASSETS_DIR, f))])

          for folder_name in project_folders:
              project_path = os.path.join(ASSETS_DIR, folder_name)
              config_path = os.path.join(project_path, 'config.json')

              if not os.path.exists(config_path):
                  continue

              with open(config_path, 'r') as f:
                  config = json.load(f)

              asset_filename = config.get('asset_name')
              asset_rel_path = f"{ASSETS_DIR}/{folder_name}/{asset_filename}"
              _, ext = os.path.splitext(asset_filename.lower())

              reversed_class = "reversed" if config.get('isReversed', False) else ""

              section_html = f'<section class="project-section {reversed_class}" data-model="{asset_rel_path}" data-color="{config.get("color", "0xffffff")}">'
              section_html += f'  <div class="project-info">'
              section_html += f'    <h1>{config["title"]}</h1>'
              section_html += f'    <p>{config["description"]}</p>'
              section_html += f'  </div>'
              section_html += f'  <div class="canvas-container">'
              
              if ext in ['.jpg', '.png', '.jpeg', '.webp']:
                  section_html += f'    <img src="{asset_rel_path}" alt="{config["title"]}" style="width:100%; height:100%; object-fit:cover;">'
              
              section_html += f'  </div>'
              section_html += f'</section>'
              
              html_sections.append(section_html)

          with open(TEMPLATE_PATH, 'r') as t:
              template_content = t.read()

          final_html = template_content.replace('<!-- BUILD_TARGET -->', '\n'.join(html_sections))

          with open(OUTPUT_PATH, 'w') as f:
              f.write(final_html)

      - name: Commit and Push generated index.html
        run: |
          git config --global user.name "Project Builder Bot"
          git config --global user.email "bot@noreply.github.com"
          git add index.html
          git commit -m "Autogenerated index.html via GitHub Action" || exit 0
          git push
