<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomedical Engineering Portfolio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000000;
            color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }
        scroll-container {
            display: block;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        section {
            display: table;
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            border-bottom: 1px solid #1d1d1f;
        }
        .project-info {
            display: table-cell;
            vertical-align: middle;
            width: 45%;
            padding: 0 5%;
            z-index: 10;
            background: linear-gradient(90deg, rgba(0,0,0,0.85) 60%, rgba(0,0,0,0));
        }
        .project-info h1 {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #ffffff;
        }
        .project-info p {
            font-size: 1.25rem;
            line-height: 1.5;
            color: #86868b;
        }
        .canvas-container {
            position: absolute;
            right: 0;
            top: 0;
            width: 55%;
            height: 100%;
        }
        section.reversed {
            direction: rtl;
        }
        section.reversed .project-info {
            direction: ltr;
            background: linear-gradient(270deg, rgba(0,0,0,0.85) 60%, rgba(0,0,0,0));
        }
        section.reversed .canvas-container {
            left: 0;
            right: auto;
            direction: ltr;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
<scroll-container id="scroller">
    <section>
        <div class="project-info">
            <h1>Biomedical Engineering Portfolio</h1>
            <p>Scroll down to see the autogenerated dynamic 3D portfolio items.</p>
        </div>
        <div class="canvas-container"></div>
    </section>

    <!-- BUILD_TARGET -->

</scroll-container>

<script type="module">
    import * as THREE from 'three';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';

    const container = document.getElementById('scroller');
    const sections = document.querySelectorAll('.project-section');
    const apps = [];

    sections.forEach((section) => {
        const canvasDiv = section.querySelector('.canvas-container');
        const modelPath = section.getAttribute('data-model');
        const meshColor = parseInt(section.getAttribute('data-color'));
        if (!modelPath || modelPath.match(/\.(jpg|jpeg|png|webp|gif)$/i)) return;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, canvasDiv.clientWidth / canvasDiv.clientHeight, 0.1, 1000);
        camera.position.set(0, 0, 120);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(canvasDiv.clientWidth, canvasDiv.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        canvasDiv.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x404040, 1.5));
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 2.5);
        dirLight1.position.set(1, 1, 1).normalize();
        scene.add(dirLight1);

        let loadedMesh = null;
        const loader = new STLLoader();
        loader.load(modelPath, (geometry) => {
            geometry.center();
            const material = new THREE.MeshPhongMaterial({ color: meshColor, specular: 0x111111, shininess: 200 });
            loadedMesh = new THREE.Mesh(geometry, material);
            geometry.computeBoundingSphere();
            const radius = geometry.boundingSphere.radius;
            const scaleFactor = 40 / radius;
            loadedMesh.scale.set(scaleFactor, scaleFactor, scaleFactor);
            scene.add(loadedMesh);
        });

        apps.push({ section, scene, camera, renderer, loadedMesh });
    });

    let scrollPercent = 0;
    container.addEventListener('scroll', () => {
        scrollPercent = container.scrollTop / (container.scrollHeight - container.clientHeight);
    });

    function animate() {
        requestAnimationFrame(animate);
        apps.forEach((app) => {
            if (app.loadedMesh) {
                app.loadedMesh.rotation.y = scrollPercent * Math.PI * 4;
                app.loadedMesh.rotation.x = scrollPercent * Math.PI * 1.5;
            }
            app.renderer.render(app.scene, app.camera);
        });
    }
    animate();
</script>
</body>
</html>
